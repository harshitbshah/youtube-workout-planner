name: Weekly Workout Plan

on:
  schedule:
    - cron: '0 18 * * 0'  # Every Sunday at 6pm UTC — adjust to your timezone
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:
  generate-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly planner
        env:
          YOUTUBE_API_KEY:              ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_OAUTH_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID:            ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:        ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py --run

      - name: Commit updated database
        run: |
          git config user.name  "workout-planner-bot"
          git config user.email "bot@github-actions"
          git add workout_library.db
          git diff --staged --quiet || git commit -m "chore: update workout library [$(date +%Y-%m-%d)]"
          git push
