# ─────────────────────────────────────────────
# YouTube Workout Planner — Configuration
# ─────────────────────────────────────────────

# Your YouTube channels (add or remove freely)
channels:
  - name: "TIFFxDAN"
    url: "https://www.youtube.com/@TIFFxDAN"
  - name: "JuiceandToya"
    url: "https://www.youtube.com/@JuiceandToya"
  - name: "HASfit"
    url: "https://www.youtube.com/@HASfit"

# Weekly workout structure
# workout_type: HIIT | Strength | Mobility | Cardio | Rest
# body_focus:   upper | lower | full | core | any
schedule:
  monday:
    workout_type: Strength
    body_focus: upper
    duration_max_min: 45
  tuesday:
    workout_type: HIIT
    body_focus: full
    duration_max_min: 45
  wednesday:
    workout_type: Strength
    body_focus: lower
    duration_max_min: 45
  thursday:
    workout_type: HIIT
    body_focus: core
    duration_max_min: 45
  friday:
    workout_type: Strength
    body_focus: full
    duration_max_min: 45
  saturday:
    workout_type: Cardio
    body_focus: full
    duration_max_min: 45
  sunday:
    workout_type: Rest
    body_focus: any
    duration_max_min: 0

# Playlist settings
playlist:
  # The YouTube playlist ID to refresh every week
  # Create a playlist manually in YouTube, then paste its ID here
  # e.g. for https://youtube.com/playlist?list=PLxxxxxxx → PLxxxxxxx
  id: "PLs4ch3R20FHJMLMRrRtOL2NfSkCuH9mzb"
  name: "Weekly Workout Plan"

# Newer videos get boosted priority (in weeks — videos newer than this are preferred)
recency_boost_weeks: 24
