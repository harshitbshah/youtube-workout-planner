# ─────────────────────────────────────────────
# YouTube Workout Planner — Configuration
# ─────────────────────────────────────────────

# Your YouTube channels (add or remove freely)
channels:
  - name: "TIFFxDAN"
    url: "https://www.youtube.com/@TIFFxDAN"
  - name: "JuiceandToya"
    url: "https://www.youtube.com/@JuiceandToya"
  - name: "HASfit"
    url: "https://www.youtube.com/@HASfit"

# Weekly workout structure
# workout_type: HIIT | Strength | Mobility | Cardio | Rest
# body_focus:   upper | lower | full | core | any
schedule:
  monday:
    workout_type: Strength
    body_focus: upper
    duration_min: 30
    duration_max: 45
    difficulty: any
  tuesday:
    workout_type: HIIT
    body_focus: full
    duration_min: 30
    duration_max: 45
    difficulty: any
  wednesday:
    workout_type: Strength
    body_focus: lower
    duration_min: 30
    duration_max: 45
    difficulty: any
  thursday:
    workout_type: HIIT
    body_focus: core
    duration_min: 15
    duration_max: 45
    difficulty: any
  friday:
    workout_type: Strength
    body_focus: full
    duration_min: 30
    duration_max: 45
    difficulty: any
  saturday:
    workout_type: Cardio
    body_focus: full
    duration_min: 30
    duration_max: 45
    difficulty: any
  sunday:
    workout_type: Rest
    body_focus: any
    duration_min: 0
    duration_max: 0

# Newer videos get boosted priority (in weeks — videos newer than this are preferred)
recency_boost_weeks: 24

# Maximum times the same channel can appear in a single week's plan
# With 3 channels and 6 training days, 2 means each channel appears at most twice
max_channel_repeats: 2
