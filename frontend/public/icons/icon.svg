<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="#18181b"/>

  <!--
    Geometric "P"
    Horizontally centred: letter spans x=126–386 (260px), centre=256
    Vertically: y=96–420 (324px tall), bowl y=96–280

    Stem:  x=126, width=76
    Bowl outer D:  semicircle centre=(294, 188) r=92  →  rightmost x=386
    Bowl inner cutout:  same centre r=48  (wall thickness=44px)
  -->

  <!-- Stem -->
  <rect x="126" y="96" width="76" height="324" rx="14" fill="white"/>

  <!-- Bowl outer (D-shape: flat left + semicircle right) -->
  <path d="M 126 96 L 294 96 A 92 92 0 1 1 294 280 L 126 280 Z" fill="white"/>

  <!-- Bowl inner cutout -->
  <path d="M 202 140 L 294 140 A 48 48 0 1 1 294 236 L 202 236 Z" fill="#18181b"/>
</svg>
